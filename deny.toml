# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/

[graph]
# Check all non-dev, non-build targets that would ship in a release binary.
all-features = false

[advisories]
# Deny CVE advisories; warn on unmaintained/yanked as a signal without blocking.
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = []

[licenses]
version = 2
# OSI-approved permissive licenses we accept. Adding to this list is a deliberate
# act — if a new dep requires something else, audit before relaxing.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "allow"  # Rust's diamond-dep graph frequently produces duplicates; not worth fighting.
wildcards = "warn"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
