name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: cargo check + test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ci-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ci-

      - name: Rust toolchain
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: cargo check
        run: cargo check --all-targets --locked

      - name: cargo test (library + unit)
        # Skip integration tests — they spawn a real daemon with tmux and
        # talk over a local TCP socket; they expect a specific beast/tmux
        # layout and aren't self-contained enough for CI runners.
        run: cargo test --lib --locked
