name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt + clippy + check + test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        # submodule `threadmill` is only needed by codegen/generate.sh; the
        # generated src/protocol.rs is committed, so cargo builds don't need it.

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ci-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ci-

      - name: Rust toolchain
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (deny warnings)
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: cargo check
        run: cargo check --all-targets --locked

      - name: cargo test (library + unit)
        # Skip integration tests — they spawn a real daemon with tmux and
        # talk over a local TCP socket; they expect a specific beast/tmux
        # layout and aren't self-contained enough for CI runners.
        run: cargo test --lib --locked

  deny:
    name: cargo-deny (licenses + advisories + sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
