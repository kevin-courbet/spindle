name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Default to read-only; individual jobs opt into additional perms.
permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.triple }}
    runs-on: macos-14
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write      # SLSA provenance signing via Sigstore
      attestations: write  # actions/attest-build-provenance
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: aarch64-apple-darwin
            build_target: aarch64-apple-darwin
            use_zigbuild: false
          - triple: x86_64-apple-darwin
            build_target: x86_64-apple-darwin
            use_zigbuild: false
          - triple: x86_64-unknown-linux-gnu
            build_target: x86_64-unknown-linux-gnu.2.31
            use_zigbuild: true
          - triple: aarch64-unknown-linux-gnu
            build_target: aarch64-unknown-linux-gnu.2.31
            use_zigbuild: true
    steps:
      - uses: actions/checkout@v6
        # submodule `threadmill` is only needed by codegen/generate.sh; the
        # generated src/protocol.rs is committed, so cargo builds don't need it.

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.triple }}

      - name: Install zig + cargo-zigbuild (Linux targets only)
        if: matrix.use_zigbuild
        run: |
          brew install zig
          zig version
          cargo install cargo-zigbuild --locked

      - name: Add Rust target
        run: rustup target add ${{ matrix.triple }}

      - name: Build (zigbuild for Linux, cargo for mac)
        run: |
          if [ "${{ matrix.use_zigbuild }}" = "true" ]; then
            cargo zigbuild --release --target ${{ matrix.build_target }} --bin spindle --bin threadmill-cli --locked
          else
            cargo build --release --target ${{ matrix.build_target }} --bin spindle --bin threadmill-cli --locked
          fi

      - name: Package
        id: package
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-workflow-dispatch}"
          BIN_DIR="target/${{ matrix.triple }}/release"
          STAGE_ROOT="$(mktemp -d)"
          STAGE="${STAGE_ROOT}/spindle-${VERSION}-${{ matrix.triple }}"
          mkdir -p "$STAGE"
          cp "$BIN_DIR/spindle" "$BIN_DIR/threadmill-cli" "$STAGE/"
          ARCHIVE="spindle-${VERSION}-${{ matrix.triple }}.tar.gz"
          tar -czf "$ARCHIVE" -C "$STAGE_ROOT" "spindle-${VERSION}-${{ matrix.triple }}"
          shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "archive_path=$GITHUB_WORKSPACE/$ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance (SLSA)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.package.outputs.archive_path }}

      - uses: actions/upload-artifact@v7
        with:
          name: spindle-${{ matrix.triple }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # scoped to the release job only
    # Only publish on tag pushes, not on workflow_dispatch dry runs.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ls -la ./artifacts
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --repo "$GITHUB_REPOSITORY" \
            ./artifacts/*.tar.gz ./artifacts/*.sha256
